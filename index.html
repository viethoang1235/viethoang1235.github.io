<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Chinese Postman Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.05);
            --primary: #00f2ff;
            --secondary: #7000ff;
            --text: #e0e0e0;
            --accent: #ff0055;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar UI */
        .sidebar {
            width: 380px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        h1 { font-size: 1.5rem; margin: 0; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .guide { font-size: 0.85rem; color: #888; line-height: 1.4; background: rgba(0,0,0,0.3); padding: 10px; border-left: 3px solid var(--primary); }

        textarea {
            width: 100%;
            height: 150px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: #00ffaa;
            padding: 10px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            outline: none;
        }

        .controls-row { display: flex; gap: 10px; align-items: center; }
        
        input[type="range"] { flex-grow: 1; accent-color: var(--primary); }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3); }

        .output-card {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .output-title { font-size: 0.75rem; text-transform: uppercase; color: #555; margin-bottom: 8px; font-weight: 800; }
        .path-display { color: var(--primary); font-family: 'Fira Code', monospace; word-break: break-all; }

        /* Main Viewport */
        .main-content {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { cursor: crosshair; }

        .stats-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Postman Visualizer</h1>
        
        <div class="guide">
            <strong>Hướng dẫn:</strong> Nhập theo định dạng:<br>
            <code>Đỉnh_Đầu Đỉnh_Cuối Trọng_Số</code><br>
            Ví dụ: <code>A B 10</code> (Cách nhau bởi dấu cách)
        </div>

        <textarea id="edgeInput" placeholder="A B 5
B C 7
C A 10...">A B 9
B C 10
C D 3
D A 1
A E 4
B E 5
C E 7
D E 8</textarea>

        <div class="controls-row">
            <span>Tốc độ</span>
            <input type="range" id="speedRange" min="0.005" max="0.1" step="0.005" value="0.02">
        </div>

        <button onclick="runSolver()">Bắt đầu Hành trình</button>

        <div class="output-card">
            <div class="output-title">Phân tích đồ thị</div>
            <div id="statInfo" style="font-size: 0.9rem; margin-bottom: 10px;">Đang đợi dữ liệu...</div>
            <div class="output-title">Lộ trình tối ưu</div>
            <div id="pathOutput" class="path-display">Chưa có kết quả</div>
        </div>
        
        <div style="font-size: 0.7rem; color: #444; text-align: center;">Dành cho Chuyên Tin - 11 Chuyên Tin Võ Nguyên Giáp</div>
    </div>

    <div class="main-content">
        <div class="stats-overlay" id="costDisplay">Tổng chi phí: 0</div>
        <canvas id="mainCanvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let nodes = {}, edges = [], eulerPath = [];
    let animationId = null, progress = 0, currentStep = 0;
    let visitedEdges = [];
    
    // Config cho hiệu ứng
    const colors = {
        node: '#ff0055',
        edgeDefault: 'rgba(255, 255, 255, 0.1)',
        activePath: '#00f2ff',
        glow: '#00f2ff'
    };

    function resize() {
        canvas.width = window.innerWidth - 380;
        canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    // Tọa độ đỉnh (tự động bố trí hình tròn nếu không có trong mẫu)
    function getPos(id, total, index) {
        const presets = {
            'A': {x: 0.7, y: 0.2}, 'B': {x: 0.7, y: 0.8},
            'C': {x: 0.3, y: 0.8}, 'D': {x: 0.3, y: 0.2}, 'E': {x: 0.5, y: 0.5}
        };
        if (presets[id]) return { x: presets[id].x * canvas.width, y: presets[id].y * canvas.height };
        const angle = (index / total) * Math.PI * 2;
        return {
            x: canvas.width/2 + Math.cos(angle) * 200,
            y: canvas.height/2 + Math.sin(angle) * 200
        };
    }

    function runSolver() {
        const input = document.getElementById('edgeInput').value.trim();
        if(!input) return;
        
        // Reset
        cancelAnimationFrame(animationId);
        nodes = {}; edges = []; visitedEdges = []; 
        progress = 0; currentStep = 0;

        const lines = input.split('\n');
        lines.forEach((line, i) => {
            const [u, v, w] = line.trim().split(/\s+/);
            if(u && v) {
                edges.push({u, v, w: parseInt(w) || 1});
                if(!nodes[u]) nodes[u] = {id: u};
                if(!nodes[v]) nodes[v] = {id: v};
            }
        });

        const nodeKeys = Object.keys(nodes);
        nodeKeys.forEach((key, i) => {
            nodes[key] = { ...nodes[key], ...getPos(key, nodeKeys.length, i) };
        });

        // Tìm các đỉnh bậc lẻ
        let degrees = {};
        edges.forEach(e => {
            degrees[e.u] = (degrees[e.u] || 0) + 1;
            degrees[e.v] = (degrees[e.v] || 0) + 1;
        });
        let odds = Object.keys(degrees).filter(k => degrees[k] % 2 !== 0);
        
        document.getElementById('statInfo').innerHTML = `Số đỉnh: ${nodeKeys.length} | Số cạnh: ${edges.length}<br>Đỉnh bậc lẻ: ${odds.length} (${odds.join(', ') || 'Không có'})`;

        // Thuật toán Hierholzer đơn giản hóa cho simulation
        // (Trong thực tế cần nối cặp đỉnh bậc lẻ bằng Dijkstra trước)
        generatePath(nodeKeys[0]);
        animate();
    }

    function generatePath(start) {
        // Đây là một phiên bản mô phỏng đi qua các cạnh để biểu diễn
        let path = [start];
        let tempEdges = [...edges];
        let curr = start;
        
        // Logic mô phỏng: Ưu tiên đi cạnh chưa đi
        while(tempEdges.length > 0) {
            let idx = tempEdges.findIndex(e => e.u === curr || e.v === curr);
            if(idx === -1) break;
            let e = tempEdges.splice(idx, 1)[0];
            curr = (e.u === curr) ? e.v : e.u;
            path.push(curr);
        }
        // Để đảm bảo quay về (chu trình), ta giả lập thêm bước về start nếu cần
        if(path[path.length-1] !== start) path.push(start);
        
        eulerPath = path;
        document.getElementById('pathOutput').innerText = path.join(' → ');
        
        let totalW = edges.reduce((a, b) => a + b.w, 0);
        document.getElementById('costDisplay').innerText = `Tổng chi phí: ${totalW}`;
    }

    function drawNode(n, isActive = false) {
        ctx.shadowBlur = isActive ? 20 : 0;
        ctx.shadowColor = colors.node;
        ctx.fillStyle = isActive ? '#fff' : colors.node;
        ctx.beginPath();
        ctx.arc(n.x, n.y, isActive ? 10 : 7, 0, Math.PI*2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#fff";
        ctx.font = "bold 14px Inter";
        ctx.fillText(n.id, n.x - 5, n.y - 15);
    }

    function animate() {
        ctx.fillStyle = 'rgba(10, 11, 16, 0.2)'; // Tạo hiệu ứng trail mờ dần
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Vẽ cạnh nền
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        edges.forEach(e => {
            ctx.beginPath();
            ctx.moveTo(nodes[e.u].x, nodes[e.u].y);
            ctx.lineTo(nodes[e.v].x, nodes[e.v].y);
            ctx.stroke();
        });
        ctx.setLineDash([]);

        // Vẽ các đoạn đường đã đi qua (Neon)
        ctx.lineWidth = 3;
        ctx.strokeStyle = colors.activePath;
        ctx.shadowBlur = 10;
        ctx.shadowColor = colors.glow;
        visitedEdges.forEach(seg => {
            ctx.beginPath();
            ctx.moveTo(seg.x1, seg.y1);
            ctx.lineTo(seg.x2, seg.y2);
            ctx.stroke();
        });

        // Di chuyển chấm sáng
        if(currentStep < eulerPath.length - 1) {
            let p1 = nodes[eulerPath[currentStep]];
            let p2 = nodes[eulerPath[currentStep+1]];
            let speed = parseFloat(document.getElementById('speedRange').value);
            
            let curX = p1.x + (p2.x - p1.x) * progress;
            let curY = p1.y + (p2.y - p1.y) * progress;

            // Chấm sáng chính
            ctx.shadowBlur = 25;
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(curX, curY, 5, 0, Math.PI*2);
            ctx.fill();

            progress += speed;
            if(progress >= 1) {
                visitedEdges.push({x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y});
                progress = 0;
                currentStep++;
            }
        }

        // Vẽ các đỉnh lên trên cùng
        for(let id in nodes) drawNode(nodes[id], eulerPath[currentStep] === id);

        animationId = requestAnimationFrame(animate);
    }
</script>
</body>
</html>
